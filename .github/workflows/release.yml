name: release

on:
  push:
    tags: ['v*']
  # Manual trigger so an already-created tag can still be published
  # without a destructive re-tag.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # `npm install` (not `npm ci`): the Windows-generated lockfile omits
        # Linux-only optional dep nodes (rollup wasm fallback / @emnapi/*), a known
        # npm cross-OS gap that breaks `npm ci`'s strict sync check.
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
