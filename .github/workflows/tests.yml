name: tests

on:
  push:
    branches: [main, 'task/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Test toolchain (vitest 4 / vite 7) requires Node >=20; the published
        # SDK itself still supports Node >=18 at runtime.
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # `npm install` (not `npm ci`): the Windows-generated lockfile omits
        # Linux-only optional dep nodes (rollup wasm fallback / @emnapi/*), a known
        # npm cross-OS gap that breaks `npm ci`'s strict sync check.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build